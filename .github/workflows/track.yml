name: ETF Holdings Tracker

on:
  schedule:
    - cron: "30 1 * * 1-5"  # 台灣時間 09:30 (UTC+8), 週一至週五
  workflow_dispatch:

concurrency:
  group: etf-tracker
  cancel-in-progress: false

jobs:
  track:
    runs-on: ubuntu-latest
    container: mcr.microsoft.com/playwright/python:v1.59.0-noble

    steps:
      - uses: actions/checkout@v4

      - name: Restore previous holdings data
        uses: actions/cache@v4
        with:
          path: data/
          key: etf-data-${{ runner.os }}
          restore-keys: etf-data-

      - name: Install dependencies
        run: pip install requests playwright

      - name: Run tracker
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python tracker.py

      - name: Save holdings data
        uses: actions/cache/save@v4
        with:
          path: data/
          key: etf-data-${{ runner.os }}-${{ github.run_id }}
