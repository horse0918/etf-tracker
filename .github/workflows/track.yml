name: ETF Holdings Tracker

on:
  schedule:
    - cron: "30 1 * * 1-5"  # 台灣時間 09:30 (UTC+8), 週一至週五
  workflow_dispatch:

concurrency:
  group: etf-tracker
  cancel-in-progress: false

jobs:
  track:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Restore previous holdings data
        uses: actions/cache@v4
        with:
          path: data/
          key: etf-data-${{ runner.os }}
          restore-keys: etf-data-

      - name: Install dependencies
        run: pip install requests playwright

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('requirements.txt') }}

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Run tracker
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python tracker.py

      - name: Save holdings data
        uses: actions/cache/save@v4
        with:
          path: data/
          key: etf-data-${{ runner.os }}-${{ github.run_id }}
